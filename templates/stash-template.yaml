#SUBSCRIBED {{SUBSCRIBED_URL}}
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://1.1.1.1/dns-query

proxies:
{{PROXIES}}

proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
{{PROXY_NAMES}}
      - DIRECT
  - name: "Auto"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    proxies:
{{PROXY_NAMES}}

rules:
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
